<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order Status | HSRP & Export Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-white shadow p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-red-600">TOMATO GLOBAL</a>
            <a href="index.html" class="text-gray-600 hover:text-red-600 font-bold">Back to Home</a>
        </div>
    </nav>

    <div class="max-w-lg mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl border-t-4 border-red-600">
        <h2 class="text-2xl font-bold text-center mb-6">Track Your HSRP Plate Order</h2>
        <p class="text-center text-sm text-gray-500 mb-8">Enter your details to check the status of your **new number plate** or Tomato Export Shipment.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Registration Number / Order ID</label>
                <input type="text" class="w-full border rounded-lg px-4 py-3 focus:outline-red-600" placeholder="e.g. DL 10C XXXX">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Engine No. / Chassis No. (Last 5 Digits)</label>
                <input type="text" class="w-full border rounded-lg px-4 py-3 focus:outline-red-600" placeholder="Enter last 5 digits">
            </div>
            <button class="w-full bg-red-600 text-white font-bold py-4 rounded-lg hover:bg-red-700 transition shadow-lg mt-4 uppercase">Check Status Now</button>
        </div>

        <div class="mt-10 p-4 bg-red-50 rounded-lg text-center">
            <p class="text-xs text-red-800">Secure tracking for **four wheeler number plate** and industrial shipments is provided by our integrated **my hsrp** portal.</p>
        </div>
    </div>
</body>
</html>
