<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Get a Quote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-extrabold text-red-600">TOMATO<span class="text-gray-800">GLOBAL</span></a>
            <div class="hidden md:flex space-x-8 font-semibold text-gray-700">
                <a href="index.html" class="hover:text-red-600">Home</a>
                <a href="about.html" class="hover:text-red-600">About Us</a>
                <a href="Products.html" class="hover:text-red-600">Products</a>
                <a href="contact.html" class="text-red-600 border-b-2 border-red-600">Contact</a>
            </div>
        </div>
    </nav>

    <section class="py-16 max-w-7xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <div>
                <h2 class="text-4xl font-bold mb-8">Get In Touch</h2>
                <div class="space-y-8">
                    <div class="flex items-center">
                        <i class="fas fa-map-marker-alt text-2xl text-red-600 mr-6"></i>
                        <p class="text-gray-700">Hebei Industrial Zone, Shijiazhuang, China</p>
                    </div>
                    <div class="flex items-center">
                        <i class="fas fa-phone-alt text-2xl text-red-600 mr-6"></i>
                        <p class="text-gray-700">+86-XXXXXXXXXXX</p>
                    </div>
                    <div class="flex items-center">
                        <i class="fas fa-envelope text-2xl text-red-600 mr-6"></i>
                        <p class="text-gray-700">sales@tomatoglobal.com</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-8 rounded-2xl shadow-lg border">
                <form action="#" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-2">Full Name</label>
                        <input type="text" class="w-full border rounded-lg px-4 py-2 focus:outline-red-600" placeholder="Enter your name">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">Email Address</label>
                        <input type="email" class="w-full border rounded-lg px-4 py-2 focus:outline-red-600" placeholder="Email for reply">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2">Message/Inquiry</label>
                        <textarea class="w-full border rounded-lg px-4 py-2 h-32 focus:outline-red-600" placeholder="Describe your bulk requirement..."></textarea>
                    </div>
                    <button class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">Send Inquiry</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
